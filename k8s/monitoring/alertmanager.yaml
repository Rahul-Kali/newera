apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-smtp-secret
  namespace: default
type: Opaque
stringData:
  SMTP_PASS: "REPLACE_WITH_GMAIL_APP_PASSWORD"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: default
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      smtp_smarthost: 'smtp.gmail.com:587'
      smtp_from: 'newera-alerts@gmail.com'
      smtp_auth_username: 'newera-alerts@gmail.com'
      smtp_auth_password: 'REPLACE_WITH_GMAIL_APP_PASSWORD'
      smtp_require_tls: true

    route:
      receiver: 'newera-email-alerts'
      group_by: ['alertname', 'severity']
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 1h

    receivers:
      - name: 'newera-email-alerts'
        email_configs:
          - to: 'kalirahul176@gmail.com'
            send_resolved: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels: { app: alertmanager }
  template:
    metadata:
      labels: { app: alertmanager }
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:latest
          ports: [{ containerPort: 9093 }]
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
      volumes:
        - name: config
          configMap: { name: alertmanager-config }
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: default
spec:
  type: NodePort
  selector: { app: alertmanager }
  ports:
    - port: 9093
      targetPort: 9093
      nodePort: 30093
