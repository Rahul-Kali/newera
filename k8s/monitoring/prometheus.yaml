apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: newera
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s
    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["alertmanager:9093"]
    rule_files:
      - /etc/prometheus/alert.rules.yml
    scrape_configs:
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["newera"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            target_label: __address_temp_port
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
  alert.rules.yml: |
    groups:
      - name: newera-alerts
        rules:
          - alert: ServiceDown
            expr: up == 0
            for: 30s
            labels: { severity: critical }
            annotations:
              summary: "{{ $labels.job }} is DOWN"
              description: "Prometheus could not scrape {{ $labels.job }} for 30s."

          - alert: HighErrorRate
            expr: sum(rate(http_requests_total{status=~"5.."}[2m])) by (job) > 0.05
            for: 1m
            labels: { severity: warning }
            annotations:
              summary: "High 5xx error rate on {{ $labels.job }}"
              description: "{{ $labels.job }} 5xx rate exceeded threshold for 2m."

          - alert: PaymentFailureSpike
            expr: increase(payment_failures_total[5m]) > 5
            for: 1m
            labels: { severity: critical }
            annotations:
              summary: "Spike in payment failures"
              description: "More than 5 payment failures in 5 minutes."

          - alert: AuthFailureSpike
            expr: increase(auth_failures_total[5m]) > 10
            for: 1m
            labels: { severity: warning }
            annotations:
              summary: "Spike in failed logins"
              description: "More than 10 failed logins in 5 minutes - possible brute force."

          - alert: LowStockAlert
            expr: inventory_low_stock_items > 0
            for: 5m
            labels: { severity: warning }
            annotations:
              summary: "Low stock detected"
              description: "One or more SKUs are below their low-stock threshold."

          - alert: PodCrashLooping
            expr: increase(kube_pod_container_status_restarts_total{namespace="newera"}[10m]) > 3
            for: 1m
            labels: { severity: critical }
            annotations:
              summary: "Pod {{ $labels.pod }} is crash-looping"
              description: "Container {{ $labels.container }} restarted >3 times in 10m."
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: newera
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: newera
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: newera
spec:
  replicas: 1
  selector:
    matchLabels: { app: prometheus }
  template:
    metadata:
      labels: { app: prometheus }
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          args: ["--config.file=/etc/prometheus/prometheus.yml"]
          ports: [{ containerPort: 9090 }]
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
            items:
              - key: prometheus.yml
                path: prometheus.yml
              - key: alert.rules.yml
                path: alert.rules.yml
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: newera
spec:
  type: NodePort
  selector: { app: prometheus }
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090
