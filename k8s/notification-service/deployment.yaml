apiVersion: v1
kind: Secret
metadata:
  name: smtp-secret
  namespace: default
type: Opaque
stringData:
  SMTP_USER: ""
  SMTP_PASS: ""
  SMTP_FROM: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels: { app: notification-service }
  template:
    metadata:
      labels: { app: notification-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3007"
    spec:
      containers:
        - name: notification-service
          image: default/notification-service:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 3007 }]
          env:
            - name: MONGO_URI
              value: mongodb://notification-db:27017/notificationdb
            - name: ALERT_EMAIL
              value: kalirahul176@gmail.com
            - name: SMTP_HOST
              value: smtp.gmail.com
            - name: SMTP_PORT
              value: "587"
          envFrom:
            - secretRef: { name: smtp-secret }
          readinessProbe:
            httpGet: { path: /health, port: 3007 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: default
spec:
  selector: { app: notification-service }
  ports: [{ port: 3007, targetPort: 3007 }]
