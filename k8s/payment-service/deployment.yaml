apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels: { app: payment-service }
  template:
    metadata:
      labels: { app: payment-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3006"
    spec:
      containers:
        - name: payment-service
          image: default/payment-service:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 3006 }]
          env:
            - name: DB_HOST
              value: payment-db
            - name: DB_USER
              value: newera
            - name: DB_PASSWORD
              value: newera123
            - name: DB_NAME
              value: paymentdb
          readinessProbe:
            httpGet: { path: /health, port: 3006 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: default
spec:
  selector: { app: payment-service }
  ports: [{ port: 3006, targetPort: 3006 }]
