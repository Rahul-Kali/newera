apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels: { app: auth-service }
  template:
    metadata:
      labels: { app: auth-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3004"
    spec:
      containers:
        - name: auth-service
          image: default/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 3004 }]
          env:
            - name: DB_HOST
              value: auth-db
            - name: DB_USER
              value: newera
            - name: DB_PASSWORD
              value: newera123
            - name: DB_NAME
              value: authdb
            - name: JWT_SECRET
              value: newera-super-secret-change-me
          readinessProbe:
            httpGet: { path: /health, port: 3004 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: default
spec:
  selector: { app: auth-service }
  ports: [{ port: 3004, targetPort: 3004 }]
