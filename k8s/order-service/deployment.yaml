apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: newera
spec:
  replicas: 2
  selector:
    matchLabels: { app: order-service }
  template:
    metadata:
      labels: { app: order-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3003"
    spec:
      containers:
        - name: order-service
          image: newera/order-service:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 3003 }]
          env:
            - name: DB_HOST
              value: order-db
            - name: DB_USER
              value: newera
            - name: DB_PASSWORD
              value: newera123
            - name: DB_NAME
              value: orderdb
            - name: USER_SERVICE_URL
              value: http://user-service:3001
            - name: PRODUCT_SERVICE_URL
              value: http://product-service:3002
            - name: INVENTORY_SERVICE_URL
              value: http://inventory-service:3005
            - name: PAYMENT_SERVICE_URL
              value: http://payment-service:3006
            - name: NOTIFICATION_SERVICE_URL
              value: http://notification-service:3007
          readinessProbe:
            httpGet: { path: /health, port: 3003 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: newera
spec:
  selector: { app: order-service }
  ports: [{ port: 3003, targetPort: 3003 }]
