apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: newera
spec:
  replicas: 2
  selector:
    matchLabels: { app: inventory-service }
  template:
    metadata:
      labels: { app: inventory-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3005"
    spec:
      containers:
        - name: inventory-service
          image: newera/inventory-service:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 3005 }]
          env:
            - name: DB_HOST
              value: inventory-db
            - name: DB_USER
              value: newera
            - name: DB_PASSWORD
              value: newera123
            - name: DB_NAME
              value: inventorydb
          readinessProbe:
            httpGet: { path: /health, port: 3005 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: newera
spec:
  selector: { app: inventory-service }
  ports: [{ port: 3005, targetPort: 3005 }]
