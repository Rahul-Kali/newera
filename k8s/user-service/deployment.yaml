apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels: { app: user-service }
  template:
    metadata:
      labels: { app: user-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
    spec:
      containers:
        - name: user-service
          image: default/user-service:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 3001 }]
          env:
            - name: DB_HOST
              value: user-db
            - name: DB_USER
              value: newera
            - name: DB_PASSWORD
              value: newera123
            - name: DB_NAME
              value: userdb
          readinessProbe:
            httpGet: { path: /health, port: 3001 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: default
spec:
  selector: { app: user-service }
  ports: [{ port: 3001, targetPort: 3001 }]
