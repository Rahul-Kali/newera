apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels: { app: product-service }
  template:
    metadata:
      labels: { app: product-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3002"
    spec:
      containers:
        - name: product-service
          image: default/product-service:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 3002 }]
          env:
            - name: MONGO_URI
              value: mongodb://product-db:27017/productdb
          readinessProbe:
            httpGet: { path: /health, port: 3002 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: default
spec:
  selector: { app: product-service }
  ports: [{ port: 3002, targetPort: 3002 }]
