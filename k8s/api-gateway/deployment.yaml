apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels: { app: api-gateway }
  template:
    metadata:
      labels: { app: api-gateway }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8084"
    spec:
      containers:
        - name: api-gateway
          image: default/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8084 }]
          env:
            - name: USER_SERVICE_URL
              value: http://user-service:3001
            - name: PRODUCT_SERVICE_URL
              value: http://product-service:3002
            - name: ORDER_SERVICE_URL
              value: http://order-service:3003
            - name: AUTH_SERVICE_URL
              value: http://auth-service:3004
            - name: INVENTORY_SERVICE_URL
              value: http://inventory-service:3005
            - name: PAYMENT_SERVICE_URL
              value: http://payment-service:3006
            - name: NOTIFICATION_SERVICE_URL
              value: http://notification-service:3007
          readinessProbe:
            httpGet: { path: /health, port: 8084 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: default
spec:
  type: NodePort
  selector: { app: api-gateway }
  ports:
    - port: 8084
      targetPort: 8084
      nodePort: 30084
