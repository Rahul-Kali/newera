apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: newera
type: Opaque
stringData:
  POSTGRES_USER: newera
  POSTGRES_PASSWORD: newera123
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-db
  namespace: newera
spec:
  replicas: 1
  selector:
    matchLabels: { app: user-db }
  template:
    metadata:
      labels: { app: user-db }
    spec:
      containers:
        - name: user-db
          image: postgres:16-alpine
          envFrom:
            - secretRef: { name: db-secret }
          env:
            - name: POSTGRES_DB
              value: userdb
          ports: [{ containerPort: 5432 }]
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: user-db-pvc }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: user-db-pvc
  namespace: newera
spec:
  accessModes: ["ReadWriteOnce"]
  resources: { requests: { storage: 1Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: user-db
  namespace: newera
spec:
  selector: { app: user-db }
  ports: [{ port: 5432, targetPort: 5432 }]
---
